research_task:
  description: >
    Conduct a thorough research about {topic}
    Make sure you find minimume 10 relevant and accurate content on solution design for {topic}.
  expected_output: >
    A json containing the extracted content about research on {topic}. json should include following attributes
    - topic
    - findings
    - relevance
    - sources
  agent: content_researcher
  output_file: outputs/L005/research_task_{run_id}.json

collect_urls_task:
  description: >
    make sure you find all web page urls from provided context.
  expected_output: >
    A json containing list of webpage url with following attributes
    - name
    - url
  agent: website_collector
  output_file: outputs/L005/collect_urls_task_{run_id}.json

